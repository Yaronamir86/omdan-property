<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="/assets/omda-icon.png">
<title>OMDA | מס רכוש</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#030712;--card:#0d1117;--primary2:#111827;--primary3:#1f2937;
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.15);
  --text:#f9fafb;--muted:#6b7280;--subtle:#4b5563;
  --accent:#f59e0b;--green:#10b981;--red:#ef4444;--blue:#3b82f6;--purple:#8b5cf6;
  --tax-res:#10b981;--tax-biz:#8b5cf6;
  --r:14px;
}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
/* ── LANDING ── */
#landing{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 24px;}
.land-logo{display:flex;align-items:center;gap:12px;margin-bottom:8px;}
.land-title{font-size:28px;font-weight:900;margin-bottom:6px;text-align:center;}
.land-sub{font-size:14px;color:var(--muted);margin-bottom:40px;text-align:center;}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;width:100%;max-width:560px;margin-bottom:28px;}
.mode-card{background:var(--card);border:2px solid var(--border);border-radius:20px;padding:32px 24px;cursor:pointer;transition:all .2s;text-align:center;}
.mode-card:hover{transform:translateY(-3px);box-shadow:0 16px 48px rgba(0,0,0,.4);}
.mode-card.res:hover{border-color:var(--tax-res);}
.mode-card.biz:hover{border-color:var(--tax-biz);}
.mode-icon{font-size:40px;margin-bottom:12px;}
.mode-name{font-size:17px;font-weight:900;margin-bottom:5px;}
.mode-desc{font-size:12px;color:var(--muted);line-height:1.5;}
/* ── APP SHELL ── */
#appShell{display:none;height:100vh;flex-direction:column;}
/* Topbar */
#topbar{background:var(--card);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0;}
.tb-left{display:flex;align-items:center;gap:12px;}
.tb-logo{font-size:14px;font-weight:900;color:var(--accent);}
#tbModeLabel{font-size:11px;font-weight:700;padding:4px 10px;border-radius:10px;}
.tb-right{display:flex;align-items:center;gap:8px;}
.tb-btn{background:var(--primary2);border:1px solid var(--border2);border-radius:8px;padding:6px 12px;color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;}
.tb-btn:hover{color:var(--text);}
/* Layout */
#layout{display:flex;flex:1;overflow:hidden;}
/* Sidebar */
#sidebar{width:220px;background:var(--card);border-left:1px solid var(--border);padding:16px 0;overflow-y:auto;flex-shrink:0;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;font-size:13px;color:var(--muted);transition:all .15s;border-right:3px solid transparent;}
.nav-item:hover{background:var(--primary2);color:var(--text);}
.nav-item.active{background:var(--primary2);color:var(--accent);border-right-color:var(--accent);font-weight:700;}
.nav-item.done{color:var(--green);}
.nav-num{width:22px;height:22px;border-radius:6px;background:var(--primary3);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0;}
.nav-item.active .nav-num{background:var(--accent);color:#000;}
.nav-item.done .nav-num{background:var(--green);color:#000;}
.nav-section{font-size:10px;font-weight:700;color:var(--subtle);padding:12px 16px 4px;text-transform:uppercase;letter-spacing:.08em;}
/* Main */
#main{flex:1;overflow-y:auto;padding:24px;}
.card-container{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;max-width:860px;}
.card-title{font-size:17px;font-weight:900;margin-bottom:4px;}
.card-sub{font-size:12px;color:var(--muted);margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border);}
/* Fields */
.field{margin-bottom:14px;}
.label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;}
input[type=text],input[type=number],input[type=email],input[type=tel],input[type=date],select,textarea{
  width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:9px 12px;
  color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border-color .2s;}
input:focus,select:focus,textarea:focus{border-color:var(--accent);}
input::placeholder,textarea::placeholder{color:var(--subtle);}
textarea{resize:vertical;min-height:72px;}
select option{background:#111827;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.span2{grid-column:1/-1;}
.divider{border:none;border-top:1px solid var(--border);margin:20px 0;}
/* Pills */
.pill-group{display:flex;flex-wrap:wrap;gap:6px;}
.pill{padding:6px 14px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;}
.pill:hover{border-color:var(--muted);color:var(--text);}
.pill.active{border-color:var(--accent);background:rgba(245,158,11,.12);color:var(--accent);}
.pill.active-green{border-color:var(--green);background:rgba(16,185,129,.12);color:var(--green);}
.pill.active-red{border-color:var(--red);background:rgba(239,68,68,.12);color:var(--red);}
/* Buttons */
.btn{padding:9px 18px;border-radius:10px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all .2s;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:linear-gradient(135deg,#f59e0b,#d97706);color:#000;}
.btn-primary:hover{opacity:.88;}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--muted);}
.btn-ghost:hover{border-color:var(--border2);color:var(--text);}
.btn-green{background:linear-gradient(135deg,#10b981,#059669);color:#fff;}
.btn-sm{padding:5px 10px;font-size:11px;border-radius:7px;}
.btn-xs{padding:3px 8px;font-size:11px;border-radius:6px;}
/* Notes */
.note{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:8px;padding:10px 14px;font-size:12px;color:#fbbf24;margin-bottom:14px;}
.note-green{background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.2);color:#6ee7b7;}
.note-red{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.2);color:#fca5a5;}
/* Tables */
.tax-table{width:100%;border-collapse:collapse;font-size:12px;}
.tax-table th{background:var(--primary2);padding:8px 10px;text-align:right;font-weight:700;color:var(--muted);font-size:11px;border-bottom:1px solid var(--border);}
.tax-table td{padding:7px 8px;border-bottom:1px solid var(--border);vertical-align:middle;}
.tax-table tbody tr:nth-child(even) td{background:rgba(255,255,255,.01);}
.tax-table input,.tax-table select{background:var(--primary2);border:1px solid var(--border);border-radius:5px;padding:4px 7px;color:var(--text);font-size:11px;font-family:inherit;}
.tax-table textarea{background:var(--primary2);border:1px solid var(--border);border-radius:5px;padding:4px 7px;color:var(--text);font-size:11px;font-family:inherit;min-height:auto;resize:none;}
.sum-box{background:var(--primary2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-top:12px;}
.sum-row{display:flex;justify-content:space-between;padding:4px 0;font-size:13px;}
.sum-row+.sum-row{border-top:1px solid var(--border);}
.sum-row.grand{font-size:15px;font-weight:900;padding-top:8px;margin-top:4px;}
/* Status chips */
.status-chip{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;}
.status-approved{background:rgba(16,185,129,.15);color:#6ee7b7;}
.status-partial{background:rgba(245,158,11,.15);color:#fbbf24;}
.status-rejected{background:rgba(239,68,68,.15);color:#fca5a5;}
/* Areas */
.area-item{background:var(--primary2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:8px;}
.area-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
/* Decision card */
.decision-section{background:var(--primary2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px;}
.decision-title{font-size:13px;font-weight:800;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
/* Report */
#reportView{display:none;background:#F9FAFB;min-height:100vh;color:#111;font-family:'Heebo',sans-serif;}
#reportView *{box-sizing:border-box;}
.rpt-topbar{background:#fff;border-bottom:2px solid #E5E7EB;padding:11px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.07);}
.rpt-body{max-width:820px;margin:0 auto;padding:40px 24px;}
.rpt-header{text-align:center;border-bottom:3px solid #1F2937;padding-bottom:24px;margin-bottom:32px;}
.rpt-section{margin-bottom:28px;}
.rpt-section h3{font-size:14px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:#374151;border-bottom:2px solid #E5E7EB;padding-bottom:6px;margin-bottom:12px;}
.rpt-p{line-height:1.9;font-size:14px;color:#374151;}
.rpt-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:6px;border:1px solid #E5E7EB;border-radius:8px;overflow:hidden;}
.rpt-table th{background:#F3F4F6;padding:9px 10px;text-align:right;font-weight:700;color:#374151;font-size:11px;border-bottom:2px solid #D1D5DB;border-left:1px solid #E5E7EB;}
.rpt-table td{padding:8px 10px;border-bottom:1px solid #F3F4F6;border-left:1px solid #F3F4F6;}
.rpt-table tbody tr:nth-child(even) td{background:#FAFAFA;}
.rpt-table .st{background:#F3F4F6!important;border-top:2px solid #D1D5DB;font-weight:800;}
.rpt-signature{border-top:2px solid #1F2937;padding-top:24px;margin-top:32px;text-align:center;color:#6B7280;font-size:12px;}
.rpt-summary-box{background:#F9FAFB;border:2px solid #1F2937;border-radius:8px;padding:18px;margin-top:12px;}
@media print{
  .rpt-topbar{display:none!important;}
  #reportView{display:block!important;position:static!important;}
  body{background:#fff!important;}
  @page{size:A4 portrait;margin:18mm 16mm;}
  .rpt-table thead{display:table-header-group;}
  .rpt-section{page-break-inside:avoid;}
  .rpt-table th,.rpt-table td{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
}
/* Loader */
#formLoader{position:fixed;inset:0;background:var(--bg);z-index:99990;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
#formLoader.hidden{display:none!important;}
.loader-spinner{width:40px;height:40px;border-radius:50%;border:3px solid rgba(245,158,11,.2);border-top-color:var(--accent);animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
/* Photo grid */
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-top:10px;}
.photo-thumb{position:relative;border-radius:8px;overflow:hidden;background:var(--primary2);border:1px solid var(--border);aspect-ratio:4/3;}
.photo-thumb img{width:100%;height:100%;object-fit:cover;}
.photo-del{position:absolute;top:4px;left:4px;background:rgba(0,0,0,.6);border:none;color:#fff;border-radius:50%;width:22px;height:22px;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;}
.photo-add-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:8px;border:2px dashed var(--primary3);padding:20px;cursor:pointer;font-size:12px;color:var(--muted);gap:5px;}
.photo-add-btn:hover{border-color:var(--accent);color:var(--accent);}
@media(max-width:768px){
  .grid2,.grid3{grid-template-columns:1fr;}
  #sidebar{display:none;}
  .mode-grid{grid-template-columns:1fr;}
  .card-container{padding:16px;}
}
</style>
</head>
<body>

<div id="formLoader"><div class="loader-spinner"></div><div style="font-size:13px;color:var(--muted);font-weight:600;">טוען...</div></div>

<!-- Landing -->
<div id="landing" style="display:none;">
  <div class="land-logo">
    <img src="/assets/omda-icon.png" alt="" style="height:48px;width:48px;object-fit:contain;">
    <img src="/assets/omda-logo.png" alt="OMDA רכוש" style="height:36px;object-fit:contain;filter:brightness(0) invert(1);">
  </div>
  <div class="land-title">שומת מס רכוש</div>
  <div class="land-sub">שמאי מטעם רשות המסים — בחר את סוג השומה</div>
  <div class="mode-grid">
    <div class="mode-card res" onclick="startTaxMode('residential')">
      <div class="mode-icon">🏠</div>
      <div class="mode-name" style="color:var(--tax-res);">מגורים</div>
      <div class="mode-desc">דירת מגורים · בית פרטי<br>מבנה + חפצי בית לפי תקרות</div>
    </div>
    <div class="mode-card biz" onclick="startTaxMode('business')">
      <div class="mode-icon">🏢</div>
      <div class="mode-name" style="color:var(--tax-biz);">עסק</div>
      <div class="mode-desc">מבנה עסקי · ציוד · מלאי<br>הערכת שווי שוק</div>
    </div>
  </div>
  <a href="/app/dashboard.html" style="font-size:13px;color:var(--muted);text-decoration:none;">← חזרה לדשבורד</a>
</div>

<!-- App Shell -->
<div id="appShell">
  <!-- Topbar -->
  <div id="topbar">
    <div class="tb-left">
      <a href="/app/dashboard.html" style="display:flex;align-items:center;gap:8px;text-decoration:none;">
        <img src="/assets/omda-icon.png" alt="" style="height:30px;width:30px;object-fit:contain;">
        <img src="/assets/omda-logo.png" alt="OMDA" style="height:22px;object-fit:contain;filter:brightness(0) invert(1);">
      </a>
      <span id="tbModeLabel"></span>
      <span id="tbCaseName" style="font-size:12px;color:var(--muted);"></span>
    </div>
    <div class="tb-right">
      <button class="tb-btn" onclick="generateTaxReport()">📄 הפק דוח</button>
      <button class="tb-btn" onclick="saveTaxCase()">💾 שמור</button>
      <a href="/app/dashboard.html" class="tb-btn" style="text-decoration:none;">← דשבורד</a>
    </div>
  </div>
  <div id="layout">
    <!-- Sidebar -->
    <div id="sidebar"><div id="sidebarNav"></div></div>
    <!-- Main -->
    <div id="main"><div class="card-container" id="cardContent"></div></div>
  </div>
</div>

<!-- Report -->
<div id="reportView">
  <div class="rpt-topbar">
    <div style="display:flex;align-items:center;gap:12px;">
      <button onclick="closeReport()" style="background:#F3F4F6;border:1px solid #D1D5DB;border-radius:8px;padding:7px 14px;font-family:'Heebo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;color:#374151;">← חזרה לטופס</button>
    </div>
    <div style="display:flex;gap:8px;">
      <button onclick="window.print()" style="background:linear-gradient(135deg,#f59e0b,#d97706);border:none;border-radius:8px;padding:8px 16px;font-family:'Heebo',sans-serif;font-weight:700;cursor:pointer;color:#000;">🖨️ הדפס / PDF</button>
    </div>
  </div>
  <div class="rpt-body" id="rptBody"></div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const app = initializeApp({
  apiKey:"AIzaSyCkhNhUHWLAf6G45nIH1wIZeE-rGQFrwgM",
  authDomain:"omda-property.firebaseapp.com",
  projectId:"omda-property",
  storageBucket:"omda-property.firebasestorage.app",
  messagingSenderId:"1028931108038",
  appId:"1:1028931108038:web:01731ca2a152b700ea6bc7"
});
const auth = getAuth(app);
const db   = getFirestore(app);

// ── TAX RATES (default gov.il 1.6.17) ──
window.TAX_RATES = {
  categories:{
    furniture: {label:'ריהוט',            single:13972, couple:24163, perChild:4885, perAdult:7144},
    clothing:  {label:'בגדים',            single:5954,  couple:11910, perChild:1786, perAdult:5954},
    electrical:{label:'חשמל ואלקטרוניקה', single:25536, couple:30954, perChild:519,  perAdult:4062},
    other:     {label:'חפץ ביתי אחר',     single:8928,  couple:21426, perChild:1964, perAdult:3928},
  },
  sourceUrl:'https://www.gov.il/he/pages/max_insurance_war_damages_compensation',
  lastUpdated:'2017-06-01',
};

// ── STATE ──
let TAX_MODE = null; // 'residential' | 'business'
let currentCard = 1;
let currentCaseId = null;
let APPRAISER = {};
let _currentUser = null;

const initState = () => ({
  // Kernel
  taxMode: TAX_MODE,
  case_: { caseNum:'', operationName:'', customOperation:'', eventDate:'', visitDate:'' },
  client: { fullName:'', idNum:'', phone:'', address:'', city:'', street:'', streetNum:'' },
  event: { type:'', subType:'', mechanism:'', severity:'', habitable:'yes' },
  property: { type:'apartment', sqm:'', floor:'', yearBuilt:'', condition:'good', systems:[] },
  areas: [],
  photos: { items:[] },
  decision: { causalLink:'yes', structStatus:'approved', contentsStatus:'approved', equipStatus:'approved', inventoryStatus:'approved',
               structTotal:0, contentsTotal:0, equipTotal:0, inventoryTotal:0, emergencyTotal:0,
               totalRecognized:0, claimedTotal:0, gap:0, notes:'' },
  summary: { openingOverride:'', notes:'' },
  // Residential
  res: { numPersons:1, familyStatus:'single', numChildren:0, numAdults:0,
         structItems:[], contentsItems:[], emergencyItems:[] },
  // Business
  biz: { bizName:'', bizId:'', bizType:'', activity:'', employeeCount:'',
         structItems:[], equipItems:[], inventoryItems:[], sideExpenses:[] },
});

let STATE = initState();

// ── AUTH ──
onAuthStateChanged(auth, async user => {
  _currentUser = user || null;
  if(!user){
    window.location.href = '/app/dashboard.html';
    return;
  }
  // Load profile
  try{
    const snap = await getDoc(doc(db,'users',user.uid));
    if(snap.exists()){
      const p = snap.data();
      APPRAISER = {
        nameHe: p.nameHe || p.fullName || '',
        title:  p.title  || 'שמאי רכוש',
        phone:  p.phone  || '',
        email:  p.profEmail || p.email || '',
        license:p.license || '',
        city:   p.city || '',
        logoInitials: p.logoLetters || '',
        logoColor: p.logoColor || '#f59e0b',
        logoImage: p.logoType==='image' ? p.logoImageData : null,
        signature: p.signature || null,
      };
    }
  }catch(e){}

  // Load tax rates from Firestore
  try{
    const rsnap = await getDoc(doc(db,'system','taxRates'));
    if(rsnap.exists()) window.TAX_RATES = {...window.TAX_RATES, ...rsnap.data()};
  }catch(e){}

  // Check URL params
  const params = new URLSearchParams(window.location.search);
  const caseId = params.get('case');
  const modeParam = params.get('mode'); // 'tax-res' | 'tax-biz'

  document.getElementById('formLoader').classList.add('hidden');

  if(caseId){
    // Load existing case
    try{
      const csnap = await getDoc(doc(db,'cases',caseId));
      if(csnap.exists()){
        const data = csnap.data();
        currentCaseId = caseId;
        STATE = data.state || initState();
        TAX_MODE = STATE.taxMode || (data.mode==='tax-res'?'residential':'business');
        STATE.taxMode = TAX_MODE;
        launchApp();
        return;
      }
    }catch(e){}
  }

  if(modeParam){
    TAX_MODE = modeParam==='tax-res' ? 'residential' : 'business';
    STATE.taxMode = TAX_MODE;
    currentCaseId = 'tax_'+Date.now();
    launchApp();
    return;
  }

  // Show landing
  document.getElementById('landing').style.display = 'flex';
});

window.startTaxMode = function(mode){
  TAX_MODE = mode;
  STATE.taxMode = mode;
  currentCaseId = 'tax_'+Date.now();
  document.getElementById('landing').style.display = 'none';
  launchApp();
};

function launchApp(){
  const shell = document.getElementById('appShell');
  shell.style.display = 'flex';
  // Mode label
  const ml = document.getElementById('tbModeLabel');
  if(TAX_MODE==='residential'){
    ml.textContent='מגורים';
    ml.style.background='rgba(16,185,129,.15)';
    ml.style.color='#6ee7b7';
  } else {
    ml.textContent='עסק';
    ml.style.background='rgba(139,92,246,.15)';
    ml.style.color='#c4b5fd';
  }
  renderSidebar();
  goCard(1);
}

// ── CARDS CONFIG ──
function getCards(){
  if(TAX_MODE==='residential') return [
    {n:1, icon:'📋', label:'פתיחת תיק'},
    {n:2, icon:'⚡', label:'סיווג אירוע'},

function renderSidebar(){
  const cards = getCards();
  document.getElementById('sidebarNav').innerHTML =
    `<div class="nav-section">שומת מס רכוש</div>` +
    cards.map(c=>`<div class="nav-item ${currentCard===c.n?'active':''}" onclick="goCard(${c.n})" id="nav${c.n}">
      <span class="nav-num">${c.n}</span>${c.label}</div>`).join('');
}

window.goCard = function(n){
  currentCard = n;
  renderSidebar();
  const content = renderCard(n);
  document.getElementById('cardContent').innerHTML = content;
  // Re-attach any needed handlers
  initCardHandlers(n);
};

function initCardHandlers(n){
  // Auto-resize textareas
  document.querySelectorAll('textarea').forEach(ta=>{
    ta.addEventListener('input',()=>{ ta.style.height='auto'; ta.style.height=ta.scrollHeight+'px'; });
  });
}

// ── CARD RENDERING ──
function renderCard(n){
  if(TAX_MODE==='residential'){
    switch(n){
      case 1: return renderC1();
      case 2: return renderC2();
      case 3: return renderC3_res();
      case 4: return renderC4();
      case 5: return renderC5_struct();
      case 6: return renderC6_res_contents();
      case 7: return renderC7_res_emergency();
      case 8: return renderC8_photos();
      case 9: return renderC9_decision();
      case 10: return renderC10_report_btn();
    }
  } else {
    switch(n){
      case 1: return renderC1();
      case 2: return renderC2();
      case 3: return renderC3_biz();
      case 4: return renderC4();
      case 5: return renderC5_struct();
      case 6: return renderC6_biz_equip();
      case 7: return renderC7_biz_inventory();
      case 8: return renderC8_biz_expenses();
      case 9: return renderC9_photos_biz();
      case 10: return renderC10_decision_biz();
      case 11: return renderC11_report_btn();
    }
  }
  return '<div>כרטיס לא נמצא</div>';
}

// ── HELPERS ──
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtNum(n){ return Math.round(n).toLocaleString('he-IL'); }
function fmtDate(d){ if(!d)return''; try{return new Date(d).toLocaleDateString('he-IL');}catch{return d;} }
function OPS(){ return ['חרבות ברזל','שאגת הארי','צוק איתן','עמוד ענן','שומר החומות','נובה','אחר']; }
function EVENT_SUBS(){ return ['פגיעה ישירה','נזק הדף','נזק רסיסים','נזק משני (רטיבות/קריסה)','נזק עקיף']; }

  const items = r.contentsItems||[];
  let totalClaimed=0, totalApproved=0;

  return `<div class="card-title">🛋️ תכולה ביתית</div>

function renderC9_decision(){ return renderDecisionCard(10, 8); }
function renderC10_decision_biz(){ return renderDecisionCard(11, 9); }

function renderDecisionCard(nextN, prevN){
  const d = STATE.decision;
  // Calc totals
  const structItems = TAX_MODE==='residential'?(STATE.res.structItems||[]):(STATE.biz.structItems||[]);
  const structApproved = structItems.filter(i=>i.status!=='rejected').reduce((s,i)=>s+(parseFloat(i.qty)||0)*(parseFloat(i.price)||0),0);

  let contentsApproved=0, equipApproved=0, inventoryApproved=0, emergencyApproved=0;
  if(TAX_MODE==='residential'){
    const rates=window.TAX_RATES.categories||{};
    const r=STATE.res;
    const fs=r.familyStatus||'single';
    const nc=parseInt(r.numChildren)||0;
    const na=parseInt(r.numAdults)||0;
    Object.entries(rates).forEach(([k,cat])=>{
      const ceil=(fs==='single'?cat.single:cat.couple)+nc*cat.perChild+na*cat.perAdult;
      const item=(r.contentsItems||[]).find(i=>i.key===k)||{};
      const approved=parseFloat(item.approved)||Math.min(parseFloat(item.claimed)||0,ceil);
      if(item.status!=='rejected') contentsApproved+=Math.min(approved,ceil);
    });
    emergencyApproved=(STATE.res.emergencyItems||[]).reduce((s,i)=>s+(parseFloat(i.approved)||0),0);
  } else {
    equipApproved=(STATE.biz.equipItems||[]).filter(i=>i.status!=='rejected').reduce((s,i)=>s+(parseFloat(i.approved)||0),0);
    inventoryApproved=(STATE.biz.inventoryItems||[]).reduce((s,i)=>s+(parseFloat(i.approved)||0),0);
    emergencyApproved=(STATE.biz.sideExpenses||[]).reduce((s,i)=>s+(parseFloat(i.approved)||0),0);
  }
  const grandApproved = Math.round(structApproved+contentsApproved+equipApproved+inventoryApproved+emergencyApproved);

  return `<div class="card-title">⚖️ החלטת שמאי</div>
  <div class="card-sub">קביעת הכרה, סכומים מאושרים ונימוקים</div>
  <div class="decision-section">
    <div class="decision-title">🔗 קשר סיבתי</div>
    <div class="pill-group">
      <button class="pill ${d.causalLink==='yes'?'active-green':''}" onclick="STATE.decision.causalLink='yes';goCard(${TAX_MODE==='residential'?9:10})">קיים קשר סיבתי</button>
      <button class="pill ${d.causalLink==='partial'?'active':''}" onclick="STATE.decision.causalLink='partial';goCard(${TAX_MODE==='residential'?9:10})">קשר חלקי</button>
      <button class="pill ${d.causalLink==='no'?'active-red':''}" onclick="STATE.decision.causalLink='no';goCard(${TAX_MODE==='residential'?9:10})">אין קשר סיבתי</button>
    </div>
  </div>

  <div class="sum-box" style="margin-bottom:16px;">
    <div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:8px;">סיכום סכומים מוכרים</div>
    ${structApproved>0?`<div class="sum-row"><span>מבנה מוכר:</span><span style="color:var(--green);">₪${fmtNum(Math.round(structApproved))}</span></div>`:''}
    ${contentsApproved>0?`<div class="sum-row"><span>תכולה מוכרת:</span><span style="color:var(--green);">₪${fmtNum(Math.round(contentsApproved))}</span></div>`:''}
    ${equipApproved>0?`<div class="sum-row"><span>ציוד מוכר:</span><span style="color:var(--green);">₪${fmtNum(Math.round(equipApproved))}</span></div>`:''}
    ${inventoryApproved>0?`<div class="sum-row"><span>מלאי מוכר:</span><span style="color:var(--green);">₪${fmtNum(Math.round(inventoryApproved))}</span></div>`:''}
    ${emergencyApproved>0?`<div class="sum-row"><span>הוצאות מוכרות:</span><span style="color:var(--green);">₪${fmtNum(Math.round(emergencyApproved))}</span></div>`:''}
    <div class="sum-row grand">
      <span>סה"כ מוכר ע"י שמאי:</span>
      <span style="color:var(--green);">₪${fmtNum(grandApproved)}</span>
    </div>
  </div>

  <div class="field"><label class="label">נימוק ומסקנות שמאי</label>
    <textarea rows="5" oninput="STATE.decision.notes=this.value" placeholder="פרט את הנימוקים לקביעות, חריגות, דחיות וכל שיקול מקצועי רלוונטי...">${esc(d.notes)}</textarea>
  </div>

  <div style="display:flex;gap:10px;margin-top:16px;">
    <button class="btn btn-ghost" onclick="goCard(${prevN})">→ חזור</button>
    <button class="btn btn-green" onclick="generateTaxReport()">📄 הפק דוח סופי</button>
  </div>`;
}

window.togglePropSys = function(s){

  if(idx>=0) sys.splice(idx,1); else sys.push(s);
  STATE.property.systems = sys;
  goCard(3);
};
window.addArea = function(name){
  STATE.areas.push({name,components:[],scope:'',finding:'',action:'',match:''});
  goCard(4);
};
window.removeArea = function(i){ STATE.areas.splice(i,1); goCard(4); };
window.toggleAreaComp = function(i,c){
  const comps = STATE.areas[i].components||[];
  const idx=comps.indexOf(c);
  if(idx>=0) comps.splice(idx,1); else comps.push(c);
  STATE.areas[i].components=comps;
  goCard(4);
};
window.addStructItem = function(){
  const items = TAX_MODE==='residential'?(STATE.res.structItems||[]):(STATE.biz.structItems||[]);
  items.push({desc:'',unit:"קומפ'",qty:'1',price:'',status:'approved'});
  if(TAX_MODE==='residential') STATE.res.structItems=items; else STATE.biz.structItems=items;
  goCard(5);
};
window.removeStructItem = function(i){
  if(TAX_MODE==='residential') STATE.res.structItems.splice(i,1); else STATE.biz.structItems.splice(i,1);
  goCard(5);
};
window.updateStructItem = function(i,field,val){
  const items = TAX_MODE==='residential'?(STATE.res.structItems):(STATE.biz.structItems);
  if(items[i]) items[i][field]=val;
};
window.updateContentsItem = function(key,field,val){
  if(!STATE.res.contentsItems) STATE.res.contentsItems=[];
  let item = STATE.res.contentsItems.find(i=>i.key===key);
  if(!item){ item={key}; STATE.res.contentsItems.push(item); }
  item[field]=val;
};
window.addPhotos = function(input, nextCard){
  const files = Array.from(input.files);
  files.forEach(file=>{
    const reader=new FileReader();
    reader.onload=e=>{
      if(!STATE.photos.items) STATE.photos.items=[];
      STATE.photos.items.push({src:e.target.result,caption:''});
      goCard(TAX_MODE==='residential'?8:9);
    };
    reader.readAsDataURL(file);
  });
};
function updateTitle(){
  const n = STATE.client.fullName || STATE.case_.caseNum || '';
  document.getElementById('tbCaseName').textContent = n ? '| '+n : '';
}

// ── SAVE ──
window.saveTaxCase = async function(){
  if(!_currentUser){ alert('לא מחובר'); return; }
  const mode = TAX_MODE==='residential'?'tax-res':'tax-biz';
  STATE.taxMode = TAX_MODE;
  const data = {
    id: currentCaseId,
    mode,
    name: STATE.client.fullName || STATE.biz.bizName || STATE.case_.caseNum || 'שומת מס רכוש',
    uid: _currentUser.uid,
    state: STATE,
    updatedAt: serverTimestamp(),
    createdAt: serverTimestamp(),
  };
  try{
    await setDoc(doc(db,'cases',currentCaseId), data, {merge:true});
    const btn=document.querySelector('[onclick="saveTaxCase()"]');
    if(btn){ const orig=btn.textContent; btn.textContent='✅ נשמר'; setTimeout(()=>btn.textContent=orig,1500); }
  }catch(e){ alert('שגיאה בשמירה: '+e.message); }
};

// ── REPORT ──
window.generateTaxReport = function(){
  const rpt = buildTaxReport();
  document.getElementById('rptBody').innerHTML = rpt;
  document.getElementById('appShell').style.display='none';
  document.getElementById('landing').style.display='none';
  document.getElementById('reportView').style.display='block';
  window.scrollTo(0,0);
};
window.closeReport = function(){
  document.getElementById('reportView').style.display='none';
  document.getElementById('appShell').style.display='flex';
};

function buildTaxReport(){
  const c=STATE.case_, cl=STATE.client, e=STATE.event, p=STATE.property, d=STATE.decision;
  const r=STATE.res, bz=STATE.biz;
  const modeLabel = TAX_MODE==='residential'?'שומת מס רכוש — מגורים':'שומת מס רכוש — עסק';
  const opName = c.operationName==='אחר'?(c.customOperation||''):c.operationName||'';
  const addr = [cl.city,cl.street,cl.streetNum].filter(Boolean).join(', ');
  const esc2 = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  // Calc totals
  const structItems = TAX_MODE==='residential'?(r.structItems||[]):(bz.structItems||[]);
  const structTotal = structItems.reduce((s,i)=>(s+(parseFloat(i.qty)||0)*(parseFloat(i.price)||0)),0);
  const structApproved = structItems.filter(i=>i.status!=='rejected').reduce((s,i)=>(s+(parseFloat(i.qty)||0)*(parseFloat(i.price)||0)),0);

  let contentsRows=[], contentsApproved=0;
  let equipApproved=0, inventoryApproved=0, sideApproved=0;

  if(TAX_MODE==='residential'){
    const rates=window.TAX_RATES.categories||{};
    const fs=r.familyStatus||'single'; const nc=parseInt(r.numChildren)||0; const na=parseInt(r.numAdults)||0;
    Object.entries(rates).forEach(([k,cat])=>{
      const ceil=(fs==='single'?cat.single:cat.couple)+nc*cat.perChild+na*cat.perAdult;
      const item=(r.contentsItems||[]).find(i=>i.key===k)||{};
      const claimed=parseFloat(item.claimed)||0;
      const approved=item.status==='rejected'?0:Math.min(parseFloat(item.approved)||claimed,ceil);
      contentsApproved+=approved;
      contentsRows.push({label:cat.label,ceil,claimed:Math.min(claimed,ceil),approved:Math.round(approved),status:item.status||'approved'});
    });
    sideApproved=(r.emergencyItems||[]).reduce((s,i)=>s+(parseFloat(i.approved)||0),0);
  } else {
    equipApproved=(bz.equipItems||[]).filter(i=>i.status!=='rejected').reduce((s,i)=>s+(parseFloat(i.approved)||0),0);
    inventoryApproved=(bz.inventoryItems||[]).reduce((s,i)=>s+(parseFloat(i.approved)||0),0);
    sideApproved=(bz.sideExpenses||[]).reduce((s,i)=>s+(parseFloat(i.approved)||0),0);
  }
  const grandApproved = Math.round(structApproved+contentsApproved+equipApproved+inventoryApproved+sideApproved);

  // Logo
  let logoHtml='';
  if(APPRAISER.logoImage){
    logoHtml=`<img src="${APPRAISER.logoImage}" style="width:56px;height:56px;border-radius:12px;object-fit:cover;">`;
  } else {
    const letters=APPRAISER.logoInitials||'YA';
    const bg=APPRAISER.logoColor||'#f59e0b';
    logoHtml=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" width="56" height="56"><rect width="56" height="56" rx="14" fill="${bg}"/><text x="28" y="38" font-family="Heebo,Arial,sans-serif" font-size="20" font-weight="900" fill="#000" text-anchor="middle">${letters}</text></svg>`;
  }

  let html = `
  <div class="rpt-header">
    <div style="display:flex;align-items:flex-start;gap:16px;padding-bottom:20px;margin-bottom:20px;border-bottom:2px solid #E5E7EB;">
      ${logoHtml}
      <div style="flex:1;">
        <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;">
          <div>
            <div style="font-size:20px;font-weight:900;color:#111;">${esc2(APPRAISER.nameHe||'שמאי רכוש')}</div>
            <div style="font-size:13px;color:#6B7280;">${esc2(APPRAISER.title||'שמאי רכוש מוסמך')}</div>
          </div>
          <div style="text-align:left;font-size:12px;color:#6B7280;line-height:1.8;">
            ${APPRAISER.phone?`📞 ${esc2(APPRAISER.phone)}<br>`:''}
            ${APPRAISER.email?`✉️ ${esc2(APPRAISER.email)}<br>`:''}
            ${APPRAISER.license?`רישיון: ${esc2(APPRAISER.license)}`:''}
          </div>
        </div>
      </div>
    </div>
    <div style="background:#F0FDF4;border:2px solid #10B981;border-radius:10px;padding:14px 18px;margin-bottom:16px;">
      <div style="font-size:11px;font-weight:700;color:#065F46;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;">חוות דעת שמאית</div>
      <div style="font-size:20px;font-weight:900;color:#064E3B;">${modeLabel}</div>
      ${opName?`<div style="font-size:14px;color:#065F46;margin-top:3px;">אירוע: ${esc2(opName)}</div>`:''}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:12px;">
      <div style="background:#F9FAFB;border:1px solid #E5E7EB;border-radius:8px;padding:12px;">
        <div style="font-weight:700;color:#374151;margin-bottom:6px;">פרטי ${TAX_MODE==='residential'?'הנישום':'העסק'}</div>
        <div>${esc2(TAX_MODE==='residential'?cl.fullName:bz.bizName)}</div>
        ${cl.idNum||bz.bizId?`<div style="color:#6B7280;">${esc2(cl.idNum||bz.bizId)}</div>`:''}
        ${addr?`<div style="color:#6B7280;">${esc2(addr)}</div>`:''}
        ${cl.phone?`<div style="color:#6B7280;">${esc2(cl.phone)}</div>`:''}
      </div>
      <div style="background:#F9FAFB;border:1px solid #E5E7EB;border-radius:8px;padding:12px;">
        <div style="font-weight:700;color:#374151;margin-bottom:6px;">פרטי התיק</div>
        ${c.caseNum?`<div>מספר תביעה: <strong>${esc2(c.caseNum)}</strong></div>`:''}
        ${c.eventDate?`<div style="color:#6B7280;">תאריך אירוע: ${fmtDate(c.eventDate)}</div>`:''}
        ${c.visitDate?`<div style="color:#6B7280;">תאריך ביקור: ${fmtDate(c.visitDate)}</div>`:''}
        <div style="color:#6B7280;">תאריך דוח: ${new Date().toLocaleDateString('he-IL',{day:'numeric',month:'long',year:'numeric'})}</div>
      </div>
    </div>
  </div>`;

  // פרק נכס ואירוע
  html+=`<div class="rpt-section"><h3>תיאור הנכס והאירוע</h3>
  <table class="rpt-table"><tbody>
    ${p.type?`<tr><td style="font-weight:700;color:#6B7280;width:150px;">סוג נכס:</td><td>${esc2(p.type==='apartment'?'דירה':p.type==='house'?'בית פרטי':p.type)}</td></tr>`:''}
    ${p.sqm?`<tr><td style="font-weight:700;color:#6B7280;">שטח:</td><td>${esc2(p.sqm)} מ"ר</td></tr>`:''}
    ${p.yearBuilt?`<tr><td style="font-weight:700;color:#6B7280;">שנת בניה:</td><td>${esc2(p.yearBuilt)}</td></tr>`:''}
    ${e.subType?`<tr><td style="font-weight:700;color:#6B7280;">סוג נזק:</td><td>${esc2(e.subType)}</td></tr>`:''}
    ${e.severity?`<tr><td style="font-weight:700;color:#6B7280;">דרגת פגיעה:</td><td>${esc2(e.severity)}</td></tr>`:''}
    ${e.mechanism?`<tr><td style="font-weight:700;color:#6B7280;">מנגנון פגיעה:</td><td>${esc2(e.mechanism)}</td></tr>`:''}
    ${e.habitable?`<tr><td style="font-weight:700;color:#6B7280;">ראוי לשימוש:</td><td>${e.habitable==='yes'?'כן':'לא — נדרשת פינוי'}</td></tr>`:''}
  </tbody></table></div>`;

  // ממצאים
  if(STATE.areas?.length){
    html+=`<div class="rpt-section"><h3>ממצאי ביקור</h3>`;
    STATE.areas.forEach(area=>{
      html+=`<div style="margin-bottom:14px;padding:12px;background:#F9FAFB;border:1px solid #E5E7EB;border-radius:8px;">
        <div style="font-weight:800;font-size:13px;margin-bottom:6px;">${esc2(area.name)}</div>
        ${area.finding?`<div class="rpt-p" style="margin-bottom:6px;">${esc2(area.finding)}</div>`:''}
        <div style="display:flex;gap:16px;font-size:12px;color:#6B7280;flex-wrap:wrap;">
          ${area.scope?`<span>היקף: <strong>${esc2(area.scope)}</strong></span>`:''}
          ${area.action?`<span>פעולה: <strong>${esc2(area.action)}</strong></span>`:''}
          ${area.match?`<span>התאמה לטענה: <strong style="color:${area.match==='yes'?'#065F46':area.match==='no'?'#DC2626':'#92400E'}">${area.match==='yes'?'מתאים':area.match==='partial'?'חלקי':'לא מתאים'}</strong></span>`:''}
        </div>
      </div>`;
    });
    html+=`</div>`;
  }

  // נזקי מבנה
  if(structTotal>0){
    html+=`<div class="rpt-section"><h3>${TAX_MODE==='residential'?'א.':'א.'} נזקי מבנה — עלות שיקום</h3>
    <table class="rpt-table"><thead><tr>
      <th>#</th><th>תיאור</th><th>יח'</th><th>כמות</th><th>מחיר יח'</th><th>סה"כ</th><th>הכרה</th>
    </tr></thead><tbody>`;
    structItems.forEach((item,i)=>{
      const tot=(parseFloat(item.qty)||0)*(parseFloat(item.price)||0);
      const statusLabel = item.status==='rejected'?'לא מוכר':item.status==='partial'?'חלקי':'מוכר';
      const statusColor = item.status==='rejected'?'#DC2626':item.status==='partial'?'#92400E':'#065F46';
      html+=`<tr style="${i%2?'background:#FAFAFA;':''}">
        <td style="color:#9CA3AF;font-size:10px;">${i+1}</td>
        <td>${esc2(item.desc)}</td><td style="text-align:center;">${esc2(item.unit)}</td>
        <td style="text-align:right;">${esc2(item.qty)}</td>
        <td style="text-align:right;color:#6B7280;">${item.price?'₪'+fmtNum(parseFloat(item.price)):''}</td>
        <td style="text-align:right;font-weight:600;">${tot>0?'₪'+fmtNum(tot):''}</td>
        <td style="color:${statusColor};font-weight:700;font-size:11px;">${statusLabel}</td>
      </tr>`;
    });
    html+=`</tbody></table>
    <table style="width:100%;border-collapse:collapse;font-size:12px;margin-top:8px;border:1px solid #D1D5DB;border-radius:8px;overflow:hidden;"><tbody>
      <tr><td style="padding:8px 12px;border:1px solid #D1D5DB;">עלות שיקום כוללת (כינון):</td><td style="padding:8px 12px;border:1px solid #D1D5DB;text-align:right;font-weight:700;">₪${fmtNum(Math.round(structTotal))}</td></tr>
      <tr style="background:#ECFDF5;"><td style="padding:8px 12px;border:1px solid #D1D5DB;font-weight:900;">מוכר ע"י שמאי:</td><td style="padding:8px 12px;border:1px solid #D1D5DB;text-align:right;font-weight:900;color:#065F46;">₪${fmtNum(Math.round(structApproved))}</td></tr>
    </tbody></table></div>`;
  }

  // תכולה / ציוד / מלאי
  if(TAX_MODE==='residential' && contentsRows.length){
    html+=`<div class="rpt-section"><h3>ב. תכולה ביתית — תקרות פיצוי</h3>
    <table class="rpt-table"><thead><tr>
      <th>קטגוריה</th><th>תקרה</th><th>נטען</th><th>מוכר</th><th>הכרה</th>
    </tr></thead><tbody>
    ${contentsRows.map((r,i)=>`<tr style="${i%2?'background:#FAFAFA;':''}">
      <td style="font-weight:700;">${r.label}</td>
      <td style="color:#065F46;font-weight:600;">₪${fmtNum(r.ceil)}</td>
      <td>${r.claimed>0?'₪'+fmtNum(r.claimed):'—'}</td>
      <td style="font-weight:700;color:#065F46;">${r.approved>0?'₪'+fmtNum(r.approved):'—'}</td>
      <td style="font-size:11px;font-weight:700;color:${r.status==='rejected'?'#DC2626':r.status==='partial'?'#92400E':'#065F46'}">${r.status==='rejected'?'לא מוכר':r.status==='partial'?'חלקי':'מוכר'}</td>
    </tr>`).join('')}
    </tbody></table>
    <div style="font-size:11px;color:#6B7280;margin-top:6px;">* לא מכוסה: חפצי אומנות, תכשיטים, עתיקות, מזומנים</div></div>`;
  }

  if(TAX_MODE==='business'){
    if((bz.equipItems||[]).length){
      html+=`<div class="rpt-section"><h3>ב. ציוד עסקי — שווי שוק</h3>
      <table class="rpt-table"><thead><tr>
        <th>פריט</th><th>גיל</th><th>מצב</th><th>בסיס הערכה</th><th>נטען</th><th>מוכר</th>
      </tr></thead><tbody>
      ${bz.equipItems.map((item,i)=>`<tr style="${i%2?'background:#FAFAFA;':''}">
        <td>${esc2(item.desc)}</td><td>${esc2(item.age)||'—'}</td><td>${esc2(item.condition)||'—'}</td>
        <td>${esc2(item.basis)||'—'}</td>
        <td>${item.claimed?'₪'+fmtNum(parseFloat(item.claimed)):'—'}</td>
        <td style="font-weight:700;color:#065F46;">${item.approved?'₪'+fmtNum(parseFloat(item.approved)):'—'}</td>
      </tr>`).join('')}
      </tbody></table></div>`;
    }
    if((bz.inventoryItems||[]).length){
      html+=`<div class="rpt-section"><h3>ג. מלאי</h3>
      <table class="rpt-table"><thead><tr>
        <th>סוג מלאי</th><th>כמות</th><th>ערך יחידה</th><th>נטען</th><th>מוכר</th><th>מסמכים</th>

      ${bz.inventoryItems.map((item,i)=>`<tr style="${i%2?'background:#FAFAFA;':''}">

        <td>${item.claimed?'₪'+fmtNum(parseFloat(item.claimed)):'—'}</td>
        <td style="font-weight:700;color:#065F46;">${item.approved?'₪'+fmtNum(parseFloat(item.approved)):'—'}</td>
        <td style="font-size:11px;">${item.docs==='yes'?'✅ קיימים':item.docs==='partial'?'⚠️ חלקי':'❌ חסרים'}</td>
      </tr>`).join('')}
      </tbody></table></div>`;
    }
  }

  // סיכום
  html+=`<div class="rpt-section"><h3>סיכום — קביעת שמאי</h3>
  <div style="padding:14px;background:#ECFDF5;border:1px solid #6EE7B7;border-radius:10px;margin-bottom:14px;">
    <div style="font-size:12px;color:#065F46;font-weight:700;margin-bottom:6px;">קשר סיבתי: ${d.causalLink==='yes'?'✅ קיים':d.causalLink==='partial'?'⚠️ חלקי':'❌ לא קיים'}</div>
  </div>
  <table style="width:100%;border-collapse:collapse;font-size:13px;border:1px solid #D1D5DB;border-radius:8px;overflow:hidden;">
    <thead><tr style="background:#F3F4F6;"><th style="padding:9px 12px;border:1px solid #D1D5DB;text-align:right;">רכיב</th><th style="padding:9px 12px;border:1px solid #D1D5DB;text-align:right;color:#065F46;">מוכר ע"י שמאי</th></tr></thead>
    <tbody>
      ${structApproved>0?`<tr><td style="padding:8px 12px;border:1px solid #D1D5DB;">מבנה</td><td style="padding:8px 12px;border:1px solid #D1D5DB;text-align:right;font-weight:600;color:#065F46;">₪${fmtNum(Math.round(structApproved))}</td></tr>`:''}
      ${contentsApproved>0?`<tr><td style="padding:8px 12px;border:1px solid #D1D5DB;">תכולה ביתית</td><td style="padding:8px 12px;border:1px solid #D1D5DB;text-align:right;font-weight:600;color:#065F46;">₪${fmtNum(Math.round(contentsApproved))}</td></tr>`:''}

      ${inventoryApproved>0?`<tr><td style="padding:8px 12px;border:1px solid #D1D5DB;">מלאי</td><td style="padding:8px 12px;border:1px solid #D1D5DB;text-align:right;font-weight:600;color:#065F46;">₪${fmtNum(Math.round(inventoryApproved))}</td></tr>`:''}
      ${sideApproved>0?`<tr><td style="padding:8px 12px;border:1px solid #D1D5DB;">הוצאות</td><td style="padding:8px 12px;border:1px solid #D1D5DB;text-align:right;font-weight:600;color:#065F46;">₪${fmtNum(Math.round(sideApproved))}</td></tr>`:''}
      <tr style="background:#ECFDF5;">
        <td style="padding:10px 12px;border:1px solid #D1D5DB;font-weight:900;font-size:15px;">סה"כ מוכר ע"י שמאי:</td>
        <td style="padding:10px 12px;border:1px solid #D1D5DB;text-align:right;font-weight:900;font-size:17px;color:#065F46;">₪${fmtNum(grandApproved)}</td>
      </tr>
    </tbody>
  </table>
  ${d.notes?`<div style="margin-top:16px;padding:14px;background:#F9FAFB;border:1px solid #E5E7EB;border-radius:8px;"><div style="font-size:12px;font-weight:700;color:#374151;margin-bottom:6px;">נימוק ומסקנות שמאי</div><div class="rpt-p">${esc2(d.notes).replace(/\n/g,'<br>')}</div></div>`:''}
  </div>`;

  // תמונות
  const photos = STATE.photos.items||[];
  if(photos.length){
    html+=`<div class="rpt-section"><h3>תיעוד תמונות</h3>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;">
    ${photos.map(ph=>`<div style="text-align:center;"><img src="${ph.src}" style="width:100%;border-radius:6px;border:1px solid #E5E7EB;aspect-ratio:4/3;object-fit:cover;"></div>`).join('')}
    </div></div>`;
  }

  // חתימה
  html+=`<div class="rpt-signature">
    <p style="margin:24px 0 6px;">_______________________</p>
    <p style="font-weight:700;">${esc2(APPRAISER.nameHe||'השמאי')}</p>
    <p style="color:#9CA3AF;">${esc2(APPRAISER.title||'שמאי רכוש מוסמך')}${APPRAISER.license?' | רישיון '+esc2(APPRAISER.license):''}</p>
    <p style="color:#9CA3AF;margin-top:4px;">תאריך: ${new Date().toLocaleDateString('he-IL',{day:'numeric',month:'long',year:'numeric'})}</p>
    <p style="font-size:11px;color:#D1D5DB;margin-top:16px;">שומה זו הופקה מטעם רשות מס רכוש</p>
  </div>`;

  if(APPRAISER.signature){
    html+=`<div style="margin-top:24px;text-align:left;"><img src="${APPRAISER.signature}" style="max-height:52px;max-width:170px;"></div>`;
  }

  return html;
}
</script>
</body>
</html>
