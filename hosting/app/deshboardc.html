<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OMDA | דשבורד</title>
  <script>
    // רץ לפני הרינדור — מונע flash
    try{
      const _cachedRaw=localStorage.getItem("omdan_profile");
      const _cached=_cachedRaw?JSON.parse(_cachedRaw):null;
      const p=(_cached&&_cached._uid===u.uid)?_cached:null;
      if(p){
        document.addEventListener("DOMContentLoaded",()=>{
          const mark=document.getElementById("logoMark");
          const name=document.getElementById("logoName");
          if(!mark||!name) return;
          if(p.logoType==="upload"&&p.logoImageData){
            mark.innerHTML=`<img src="${p.logoImageData}" style="width:100%;height:100%;object-fit:cover;">`;
          } else {
            mark.textContent=p.logoLetters||"YA";
            mark.style.background=p.logoColor||"#F59E0B";
          }
          if(p.nameHe) name.textContent=p.nameHe;
        });
      }
    }catch(e){}
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    /* ── CSS VARS — זהה לחלוטין ל-form.html ── */
    :root{
      --primary:#111827;--primary2:#1F2937;--primary3:#374151;
      --r:10px;
      --accent:#F59E0B;--accent2:#FDE68A;--accent3:#D97706;
      --blue:#3B82F6;--red:#EF4444;--green:#10B981;--purple:#8B5CF6;
      --text:#F9FAFB;--muted:#9CA3AF;--subtle:#6B7280;--border:#1F2937;
      --card:#111827;--bg:#030712;
      --shadow:0 4px 20px rgba(0,0,0,0.4);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6;}

    /* ── NAV ── */
    #topbar{
      background:var(--primary);border-bottom:1px solid var(--border);
      padding:0 20px;display:flex;align-items:center;justify-content:space-between;
      height:56px;position:sticky;top:0;z-index:100;
    }
    .tb-left{display:flex;align-items:center;gap:10px;}
    .tb-logo{font-size:20px;font-weight:900;color:var(--accent);letter-spacing:1px;}
    .tb-divider{width:1px;height:22px;background:var(--border);}
    .tb-page{font-size:13px;font-weight:700;color:var(--muted);}
    .tb-right{display:flex;align-items:center;gap:8px;}
    .tb-user{font-size:13px;color:var(--muted);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

    /* ── BUTTONS ── */
    .btn{display:inline-flex;align-items:center;gap:6px;padding:9px 20px;border:none;border-radius:12px;cursor:pointer;font-family:'Heebo',sans-serif;font-size:13px;font-weight:700;transition:all .18s;}
    .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent3));color:#111;box-shadow:0 3px 12px rgba(245,158,11,.3);}
    .btn-primary:hover{transform:translateY(-1px);box-shadow:0 5px 18px rgba(245,158,11,.4);}
    .btn-secondary{background:var(--primary2);border:1px solid var(--primary3);color:var(--text);}
    .btn-secondary:hover{border-color:var(--muted);}
    .btn-ghost{background:transparent;border:1px solid var(--primary3);color:var(--muted);}
    .btn-ghost:hover{color:var(--text);border-color:var(--muted);}
    .btn-sm{padding:6px 14px;font-size:12px;border-radius:10px;}

    /* ── MAIN ── */
    main{max-width:1100px;margin:0 auto;padding:28px 20px;}

    .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;}
    .page-title{font-size:20px;font-weight:800;}
    .page-sub{font-size:13px;color:var(--muted);margin-top:2px;}

    /* ── STATS ── */
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
    .sc{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 20px;transition:border-color .2s;}
    .sc:hover{border-color:var(--primary3);}
    .sc .label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}
    .sc .value{font-size:26px;font-weight:900;letter-spacing:-1px;}
    .sc .sub{font-size:12px;color:var(--subtle);margin-top:3px;}
    .sc-accent{border-top:3px solid var(--accent);}
    .sc-green{border-top:3px solid var(--green);}
    .sc-blue{border-top:3px solid var(--blue);}
    .sc-purple{border-top:3px solid var(--purple);}

    /* ── TOOLBAR ── */
    .toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px;flex-wrap:wrap;}
    .toolbar-title{font-size:16px;font-weight:800;}
    .search-wrap{position:relative;flex:1;max-width:300px;}
    .search-wrap input{
      width:100%;background:var(--primary2);border:1.5px solid var(--primary3);border-radius:10px;
      padding:9px 12px 9px 36px;font-size:13px;font-family:'Heebo',sans-serif;color:var(--text);
      direction:rtl;outline:none;transition:border-color .2s;
    }
    .search-wrap input:focus{border-color:var(--accent);}
    .search-wrap .ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px;pointer-events:none;}

    /* ── TABLE ── */
    .table-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
    table{width:100%;border-collapse:collapse;}
    thead{background:var(--primary2);}
    th{padding:11px 16px;text-align:right;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;white-space:nowrap;}
    td{padding:13px 16px;font-size:13px;border-top:1px solid var(--border);vertical-align:middle;}
    tr:hover td{background:rgba(245,158,11,.04);cursor:pointer;}
    .case-num{font-weight:800;color:var(--accent);font-size:12px;}
    .case-title{font-weight:600;max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

    /* ── BADGES ── */
    .badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;}
    .badge-draft{background:rgba(107,114,128,.15);color:var(--muted);}
    .badge-processing{background:rgba(59,130,246,.15);color:var(--blue);}
    .badge-done{background:rgba(16,185,129,.15);color:var(--green);}
    .badge-review{background:rgba(245,158,11,.15);color:var(--accent);}

    /* ── MODE TAG ── */
    .mode-tag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;}
    .mode-private{background:rgba(59,130,246,.12);color:var(--blue);}
    .mode-insurance{background:rgba(239,68,68,.12);color:var(--red);}
    .mode-tax{background:rgba(16,185,129,.12);color:var(--green);}

    /* ── EMPTY / LOADING ── */
    .loading-row td,.empty{text-align:center;padding:50px 20px;color:var(--muted);}
    .empty .icon{font-size:40px;margin-bottom:10px;}
    .empty p{font-size:14px;}
    .spin{display:inline-block;width:18px;height:18px;border:2px solid var(--primary3);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-left:8px;}
    @keyframes spin{to{transform:rotate(360deg)}}


    @media(max-width:480px){
      #topbar{padding:0 12px;}
      main{padding:16px 12px;}
      .stats{grid-template-columns:repeat(2,1fr);gap:10px;}
      .sc{padding:14px;}
      .sc .value{font-size:22px;}
      th:nth-child(3),td:nth-child(3){display:none;}
      .toolbar{flex-direction:column;align-items:stretch;}
      .search-wrap{max-width:100%;}
      .page-header{flex-direction:column;align-items:flex-start;}
    }
    @media(max-width:768px){
      .stats{grid-template-columns:repeat(2,1fr);}
      .toolbar{flex-wrap:wrap;}
      th:nth-child(4),th:nth-child(5),td:nth-child(4),td:nth-child(5){display:none;}
    }

/* ── MOBILE BOTTOM NAV ── */
.mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:var(--primary);border-top:1px solid var(--border);
  padding:8px 0 max(8px,env(safe-area-inset-bottom));
  grid-template-columns:repeat(4,1fr);gap:0;}
.mob-nav a,.mob-nav button{display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:4px 8px;color:var(--muted);font-family:'Heebo',sans-serif;
  font-size:9px;font-weight:600;background:none;border:none;cursor:pointer;
  text-decoration:none;transition:color .15s;}
.mob-nav a:hover,.mob-nav button:hover,.mob-nav a.active{color:var(--accent);}
.mob-nav .mn-icon{font-size:20px;line-height:1;}
@media(max-width:768px){
  .mob-nav{display:grid;}
  main{padding-bottom:120px !important;}
  .stats{grid-template-columns:repeat(2,1fr) !important;}
  .page-header{flex-direction:column;align-items:flex-start;gap:8px;}
  .toolbar{flex-wrap:wrap;}
  .search-wrap{max-width:100% !important;}
  th:nth-child(3),td:nth-child(3){display:none;}
  th:nth-child(5),td:nth-child(5){display:none;}
  .tb-user{display:none;}
}
@media(max-width:480px){
  #topbar{padding:0 12px;}
  .sc .value{font-size:20px;}
}

@media(max-width:768px){
  .tb-right .btn{display:none !important;}
  .tb-user{display:none !important;}
}
  </style>
</head>

<!-- Billing Gate -->
<script src="/billing.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyCkhNhUHWLAf6G45nIH1wIZeE-rGQFrwgM",
  authDomain:"omdan-property.firebaseapp.com",
  projectId:"omdan-property",
  storageBucket:"omdan-property.firebasestorage.app",
  messagingSenderId:"1028931108038",
  appId:"1:1028931108038:web:01731ca2a152b700ea6bc7"
});
const auth=firebase.auth(), db=firebase.firestore();

let currentUser=null, allCases=[];

auth.onAuthStateChanged(async u=>{
  if(!u){ window.location.href="/"; return; }
  // ── Billing check — unified ──
  const now = new Date();
  let billingToken = null;
  try {
    const billingDoc = await db.collection("billing").doc(u.uid).get();
    billingToken = billingDoc.exists ? billingDoc.data() : null;
    console.log('[Dashboard] billing:', billingToken?.plan, billingToken?.status);
  } catch(e) {
    console.warn('[Dashboard] billing fetch error:', e.message);
  }

  // אם אין billing doc — צור trial
  if (!billingToken) {
    console.log('[Dashboard] no billing, creating trial for', u.uid);
    const trialEnd = new Date(); trialEnd.setDate(trialEnd.getDate() + 14);
    billingToken = { uid: u.uid, email: u.email, plan: 'trial', products: ['omdan-property'],
      trialEnd: trialEnd.toISOString(), subscriptionEnd: null, status: null,
      reportsThisMonth: 0, createdAt: new Date().toISOString() };
    try { await db.collection("billing").doc(u.uid).set(billingToken); } catch(e) { console.warn('trial create failed:', e); }
  }

  // checkAccess — תמיכה ב-Timestamp + ISO
  const _toDate = v => v?.toDate ? v.toDate() : (v ? new Date(v) : null);
  let hasAccess = false;
  if (billingToken.plan === 'trial') {
    const trialEnd = _toDate(billingToken.trialEnd);
    hasAccess = !!trialEnd && now < trialEnd;
    console.log('[Dashboard] trial check:', hasAccess, 'end:', trialEnd);
  } else if (['starter','pro','office'].includes(billingToken.plan) && billingToken.status === 'active') {
    const subEnd = _toDate(billingToken.subscriptionEnd);
    hasAccess = !!subEnd && now < subEnd;
    console.log('[Dashboard] paid check:', hasAccess, 'plan:', billingToken.plan, 'end:', subEnd);
  }

  if (!hasAccess) {
    const reason = billingToken.plan === 'trial' ? 'trial_expired' : 'subscription_expired';
    console.warn('[Dashboard] access denied, reason:', reason);
    window.location.href = `/billing-gate.html?reason=${reason}`;
    return;
  }
  currentUser=u;
  document.getElementById("navUser").textContent=u.displayName||u.email;
  loadProfile(u.uid);
  loadCases();
});

function applyProfile(p){
  if(!p) return;
  try{
    const nameEl = document.getElementById('navUser');
    if(nameEl && (p.nameHe||p.fullName)) nameEl.textContent = p.nameHe||p.fullName;
    const sqEl = document.getElementById('topbarLogo');
    if(sqEl && p.logoLetters){
      const sq = sqEl.querySelector('.logo-sq, [data-initials]');
      if(sq){ sq.textContent=p.logoLetters; if(p.logoColor) sq.style.background=p.logoColor; }
    }
  }catch(e){ /* לא שובר */ }
}

async function loadProfile(uid){
  // ניקוי cache אם שייך ליוזר אחר
  try{
    const cached = localStorage.getItem("omdan_profile");
    if(cached){
      const parsed = JSON.parse(cached);
      // אם הcache שייך לאותו יוזר — השתמש בו
      if(parsed._uid === uid){
        applyProfile(parsed);
      } else {
        // יוזר שונה — נקה מיד
        localStorage.removeItem("omdan_profile");
      }
    }
  }catch(e){ localStorage.removeItem("omdan_profile"); }
  // טעינה מ-Firestore
  try{
    const snap=await db.collection("users").doc(uid).get();
    if(!snap.exists) return;
    const p=snap.data();
    // שמור עם uid מזהה
    localStorage.setItem("omdan_profile", JSON.stringify({...p, _uid: uid}));
    applyProfile(p);
  }catch(e){ console.warn("profile load",e); }
}


async function loadCases(){
  // הצג loading
  document.getElementById('casesBody').innerHTML=
    `<tr><td colspan="7" style="text-align:center;padding:60px;color:var(--muted);">
      <div style="font-size:28px;margin-bottom:12px;">⏳</div>
      <div style="font-weight:700;">טוען תיקים...</div>
    </td></tr>`;
  try{
    const snap = await db.collection("cases")
      .where("uid","==",currentUser.uid)
      .limit(100)
      .get();
    allCases = snap.docs.map(d=>({id:d.id,...d.data(),
      createdAt: d.data().createdAt?.toDate?.()?.toISOString() || d.data().createdAt
    }));
    allCases.sort((a,b)=> new Date(b.createdAt||0) - new Date(a.createdAt||0));
    renderStats(allCases);
    renderTable(allCases);
    document.getElementById("pageSubtitle").textContent =
      allCases.length ? `${allCases.length} תיקים בסך הכל` : '';
  }catch(e){
    console.error("loadCases error:",e);
    document.getElementById("casesBody").innerHTML=
      `<tr><td colspan="7"><div class="empty">
        <div class="icon">⚠️</div>
        <div style="font-size:16px;font-weight:700;margin-bottom:8px;color:var(--red);">שגיאה בטעינת נתונים</div>
        <p style="margin-bottom:16px;font-size:13px;">${e.message||'אירעה שגיאה בלתי צפויה'}</p>
        <button class="btn btn-ghost" onclick="location.reload()">🔄 נסה שוב</button>
      </div></td></tr>`;
  }
}

function renderStats(cases){
  const now=new Date();
  const thisMonth=cases.filter(c=>{
    if(!c.createdAt) return false;
    if(typeof c.createdAt === "string"){
      const parts = c.createdAt.split(".");
      if(parts.length===3){
        const d = new Date(parts[2], parts[1]-1, parts[0]);
        return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
      }
    } else if(c.createdAt?.seconds){
      const d = new Date(c.createdAt.seconds*1000);
      return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    }
    return false;
  });
  const done = cases.filter(c=>c.status==="completed"||(c.state?.summary?.claimTotal||c.state?.summary?.rehabTime));
  const open = cases.filter(c=>!c.status||c.status==="draft"||c.status==="processing");
  document.getElementById("statTotal").textContent = cases.length;
  document.getElementById("statOpen").textContent  = open.length;
  document.getElementById("statDone").textContent  = done.length;
  document.getElementById("statMonth").textContent = thisMonth.length;
  // הצג KPI section רק אם יש נתונים
  const statsEl = document.querySelector('.stats');
  if(statsEl) statsEl.style.display = cases.length ? '' : 'none';
}

function renderTable(cases, isSearch=false){
  const tbody=document.getElementById("casesBody");
  if(!cases.length){
    if(isSearch){
      tbody.innerHTML=`<tr><td colspan="7"><div class="empty"><div class="icon">🔍</div><div style="font-size:16px;font-weight:700;margin-bottom:8px;">לא נמצאו תוצאות</div><p>נסה מילות חיפוש אחרות</p></div></td></tr>`;
    } else {
      tbody.innerHTML=`<tr><td colspan="7"><div class="empty">
        <div class="icon">📂</div>
        <div style="font-size:18px;font-weight:800;margin-bottom:8px;color:var(--text);">אין לך עדיין תיקים</div>
        <p style="margin-bottom:20px;">התחל ביצירת תיק ראשון</p>
        <button class="btn btn-primary" onclick="newCase()" style="font-size:15px;padding:12px 28px;">+ תיק חדש</button>
      </div></td></tr>`;
    }
    return;
  }
  tbody.innerHTML=cases.map(c=>{
    const caseId = c.id || c.docId;
    const insuredName = c.state?.base?.fullName || c.name || "";
    const claimNum = c.state?.insurance?.claimNum || c.state?.base?.claimNum || "";
    const title = insuredName || claimNum ? 
      [insuredName, claimNum].filter(Boolean).join(" — ") : "ללא כותרת";
    const dateStr = typeof c.createdAt === "string" ? c.createdAt :
      (c.createdAt?.seconds ? new Date(c.createdAt.seconds*1000).toLocaleDateString("he-IL") :
      (c.updatedAt?.seconds ? new Date(c.updatedAt.seconds*1000).toLocaleDateString("he-IL") : ""));
    const isDone = c.status==="completed" || !!(c.state?.summary?.claimTotal || c.state?.summary?.rehabTime);
    const status = c.status || (isDone ? "completed" : "draft");
    const evTypeMap = {water:'💧 מים',fire:'🔥 שריפה',burglary:'🚪 פריצה',storm:'🌪️ סערה',thirdparty:"👷 צד ג'",electrical:'⚡ חשמל',other:'📋 אחר',tax:'🏛️ מס רכוש'};
    const evType = evTypeMap[c.state?.event?.eventType] || '';
    const actionBtn = isDone
      ? `<button class="btn btn-primary btn-sm" onclick="event.stopPropagation();openCaseReport('${caseId}')" style="background:var(--green);color:#000;">📄 דוח</button>`
      : `<button class="btn btn-secondary btn-sm" onclick="event.stopPropagation();openCase('${caseId}')">פתח ›</button>`;
    return `<tr onclick="openCase('${caseId}')">
      <td><span class="case-num" style="font-size:11px;color:var(--muted);">${caseId?.replace("case_","#")?.slice(-6)||"—"}</span></td>
      <td><span class="case-title">${escHtml(title)}</span></td>
      <td>${modeTag(c.mode)}</td>
      <td><span style="font-size:12px;">${evType}</span></td>
      <td>${statusBadge(status)}</td>
      <td style="color:var(--muted);font-size:12px;">${dateStr}</td>
      <td>${actionBtn}</td>
    </tr>`;
  }).join("");
}

function filterCases(){
  const q=document.getElementById("searchInput").value.toLowerCase().trim();
  if(!q){ renderTable(allCases, false); return; }
  const filtered=allCases.filter(c=>{
    const name   = (c.state?.base?.fullName||c.name||"").toLowerCase();
    const claim  = (c.state?.insurance?.claimNum||c.state?.base?.claimNum||"").toLowerCase();
    const policy = (c.state?.insurance?.policyNum||"").toLowerCase();
    const addr   = (c.state?.base?.city||c.state?.base?.street||"").toLowerCase();
    const cid    = (c.id||"").toLowerCase();
    const mode   = (c.mode||"").toLowerCase();
    return name.includes(q)||claim.includes(q)||policy.includes(q)||
           addr.includes(q)||cid.includes(q)||mode.includes(q);
  });
  renderTable(filtered, true);
}

function modeTag(m){
  const map={private:["mode-private","שומה פרטית"],insurance:["mode-insurance","ביטוח"],tax:["mode-tax","מס רכוש"]};
  const[cls,lbl]=map[m]||["mode-private",m||"שומה"];
  return`<span class="mode-tag ${cls}">${lbl}</span>`;
}

function statusBadge(s){
  const map={draft:["badge-draft","טיוטה"],processing:["badge-processing","בעיבוד"],completed:["badge-done","הושלם"],review:["badge-review","לבדיקה"]};
  const[cls,lbl]=map[s]||["badge-draft",s||"טיוטה"];
  return`<span class="badge ${cls}">${lbl}</span>`;
}

function fmtDate(iso){
  if(!iso)return"";
  return new Date(iso).toLocaleDateString("he-IL",{day:"2-digit",month:"2-digit",year:"numeric"});
}

function escHtml(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function openCase(caseId){
  // בדוק אם תיק מס רכוש
  const c = allCases.find(x=>x.id===caseId);
  const mode = c?.mode||c?.state?.taxMode||'';
  if(mode==='residential'||mode==='business'||mode==='tax-res'||mode==='tax-biz'){
    window.location.href=`/app/tax-form.html?case=${caseId}`;
  } else {
    window.location.href=`/app/case.html?case=${caseId}`;
  }
}
function openCaseReport(caseId){ window.location.href=`/app/case.html?case=${caseId}&view=report`; }
function newCase(){ window.location.href="/app/case.html"; }
function newTaxCase(mode){ window.location.href=`/app/tax-form.html?mode=${mode}`; }
function goSettings(){ window.location.href="/app/settings.html"; }
function doLogout(){ localStorage.removeItem("omdan_profile"); auth.signOut().then(()=>window.location.href="/"); }
function goBilling(){ window.location.href='/app/account-billing.html'; }
</script>
